# Portable Codex configuration managed by this repository.
# Local runtime state such as project trust history, marketplace cache paths,
# node_repl generated environment, notifications, and onboarding state is
# intentionally left out.

model = "gpt-5.5"
model_reasoning_effort = "high"
personality = "pragmatic"
sandbox_mode = "workspace-write"
approvals_reviewer = "user"
plan_mode_reasoning_effort = "xhigh"

[plugins."superpowers@openai-curated"]
enabled = true

[plugins."linear@openai-curated"]
enabled = true

[plugins."documents@openai-primary-runtime"]
enabled = true

[plugins."spreadsheets@openai-primary-runtime"]
enabled = true

[plugins."presentations@openai-primary-runtime"]
enabled = true

[plugins."browser@openai-bundled"]
enabled = true

[plugins."github@openai-curated"]
enabled = true

[mcp_servers.codegraph]
command = "codegraph"
args = ["serve", "--mcp"]

[mcp_servers.codegraph.tools.codegraph_status]
approval_mode = "approve"

[mcp_servers.codegraph.tools.codegraph_files]
approval_mode = "approve"

[mcp_servers.codegraph.tools.codegraph_context]
approval_mode = "approve"

[mcp_servers.codegraph.tools.codegraph_search]
approval_mode = "approve"

[mcp_servers.notebooklm]
command = "notebooklm-mcp"
args = ["--query-timeout", "300"]
startup_timeout_sec = 120

[mcp_servers.notebooklm.env]
SSL_CERT_FILE = "/opt/homebrew/etc/openssl@3/cert.pem"
REQUESTS_CA_BUNDLE = "/opt/homebrew/etc/openssl@3/cert.pem"

[desktop]
ambient-suggestions-enabled = false
dictationDictionary = []
preventSleepWhileRunning = true
keepRemoteControlAwakeWhilePluggedIn = true
git-branch-prefix = "[CODEX]"
git-create-pull-request-as-draft = false
git-show-sidebar-pr-icons = true
notifications-turn-mode = "always"
conversationDetailMode = "STEPS_COMMANDS"
worktree-keep-count = 10

[desktop.open-in-target-preferences]
global = "sublimeText"

[features]
js_repl = false
